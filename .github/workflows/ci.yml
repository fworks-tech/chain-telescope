name: ci

on:
  push:
    branches: [ main, master, "feat/**" ]
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python files
        run: |
          python - << 'PY'
          import pathlib, py_compile
          candidates = [
              pathlib.Path("app.py"),
              *pathlib.Path("src").rglob("*.py"),
              *pathlib.Path("pages").rglob("*.py"),
          ]
          for path in candidates:
              py_compile.compile(str(path), doraise=True)
          print("Compiled:", ", ".join(str(path) for path in candidates))
          PY

      - name: Streamlit entrypoint smoke check
        run: python -c "import importlib; importlib.import_module('app')"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
