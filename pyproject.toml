[tool.ruff]
line-length = 100
target-version = "py311"
src = ["app.py", "src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.vercel]
entrypoint = "src.api:app"
